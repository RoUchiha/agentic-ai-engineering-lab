name: agentic-ai-observability

services:
  agent-api:
    build:
      context: ../apps/agent-api
    environment:
      OBSERVABILITY_DEMO_FAILURES: "true"
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - agent-api
  grafana:
    image: grafana/grafana:12.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: portfolio-local-only
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  load-generator:
    image: python:3.12-slim
    command: ["python", "/work/loadgen.py"]
    environment:
      AGENT_API_URL: http://agent-api:8000
    volumes:
      - ./loadgen.py:/work/loadgen.py:ro
    depends_on:
      - agent-api
