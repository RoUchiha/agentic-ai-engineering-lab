apiVersion: 1

groups:
  - orgId: 1
    name: agent-slo-alerts
    folder: Agentic AI Observability
    interval: 1m
    rules:
      - uid: agent-success-rate-low
        title: Agent success rate below SLO
        condition: threshold
        data:
          - refId: success_rate
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-agentic
            model:
              expr: sum(rate(agent_runs_total{outcome=~"completed|approval_required"}[5m])) / clamp_min(sum(rate(agent_runs_total[5m])), 0.001)
              instant: true
              refId: success_rate
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: success_rate
              refId: threshold
              type: threshold
              conditions:
                - evaluator: {params: [0.95], type: lt}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {params: [], type: last}
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Agent run success rate is below 95%.
          runbook_url: https://github.com/RoUchiha/agentic-ai-engineering-lab/blob/main/docs/OBSERVABILITY_AND_GRAFANA.md
        labels: {severity: warning, service: agent-api}

      - uid: agent-p95-latency-high
        title: Agent p95 latency high
        condition: threshold
        data:
          - refId: latency
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-agentic
            model:
              expr: histogram_quantile(0.95, sum by (le) (rate(agent_run_duration_seconds_bucket[5m])))
              instant: true
              refId: latency
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: latency
              refId: threshold
              type: threshold
              conditions:
                - evaluator: {params: [1.5], type: gt}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {params: [], type: last}
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: End-to-end p95 agent latency is above 1.5 seconds.
        labels: {severity: warning, service: agent-api}

      - uid: agent-tool-error-rate-high
        title: Agent tool error rate high
        condition: threshold
        data:
          - refId: error_rate
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-agentic
            model:
              expr: sum(rate(agent_tool_calls_total{status="error"}[5m])) / clamp_min(sum(rate(agent_tool_calls_total[5m])), 0.001)
              instant: true
              refId: error_rate
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: __expr__
            model:
              datasource: {type: __expr__, uid: __expr__}
              expression: error_rate
              refId: threshold
              type: threshold
              conditions:
                - evaluator: {params: [0.05], type: gt}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {params: [], type: last}
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: More than 5% of agent tool calls are failing.
        labels: {severity: critical, service: agent-api}
