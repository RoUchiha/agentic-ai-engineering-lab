name: quality-gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run build

  python-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent-api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: pytest
      - run: python ../../scripts/build_grafana_dashboards.py --check
      - run: python ../../scripts/validate_observability.py
